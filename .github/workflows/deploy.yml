name: Deploy to Cloudflare

# Publishes public/ to colours.stuc.dev on every push to main.
# Generated files (public/colors.js, public/icons/*) are committed, so there is
# no build step here — wrangler just uploads the static assets as-is.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Run wrangler directly (pinned) rather than via wrangler-action: keeps us
      # on wrangler v4 (assets-only Workers need it) and avoids node20-based
      # actions, so there are no runner deprecation warnings.
      - name: Deploy to Cloudflare Workers
        run: npx -y wrangler@4.54.0 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
